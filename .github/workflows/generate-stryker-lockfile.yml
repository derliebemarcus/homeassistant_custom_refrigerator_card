name: Generate Stryker lockfile

on:
  push:
    branches:
      - ci/manage-stryker-dependency

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Generate lockfile
        run: npm install --package-lock-only --ignore-scripts --registry=https://artifacts.home.siczb.de/repository/npm-proxy/

      - name: Upload lockfile
        uses: actions/upload-artifact@v4
        with:
          name: stryker-lockfile
          path: package-lock.json
          if-no-files-found: error
