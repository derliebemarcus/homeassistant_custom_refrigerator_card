name: Auto-merge Release Please PRs

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  status:

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: >-
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'status' &&
       github.event.context == 'continuous-integration/jenkins/pr-head' &&
       github.event.state == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Enable squash auto-merge for a successful Release Please PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_SHA: ${{ github.event.sha }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN}" ]]; then
            echo "RELEASE_PLEASE_TOKEN is not configured."
            exit 1
          fi

          if [[ "${EVENT_NAME}" == "pull_request_target" ]]; then
            pr_number="${EVENT_PR_NUMBER}"
          else
            pr_number="$({
              gh api \
                -H "Accept: application/vnd.github+json" \
                "repos/${REPOSITORY}/commits/${EVENT_SHA}/pulls"
            } | jq -r \
              --arg repository "${REPOSITORY}" \
              '[.[] | select(
                .state == "open" and
                .base.ref == "main" and
                .head.repo.full_name == $repository
              )] | first | .number // empty')"
          fi

          if [[ -z "${pr_number:-}" ]]; then
            echo "No matching open pull request found."
            exit 0
          fi

          pr="$(gh api "repos/${REPOSITORY}/pulls/${pr_number}")"

          base_ref="$(jq -r '.base.ref' <<<"${pr}")"
          head_ref="$(jq -r '.head.ref' <<<"${pr}")"
          head_repo="$(jq -r '.head.repo.full_name' <<<"${pr}")"
          head_sha="$(jq -r '.head.sha' <<<"${pr}")"
          title="$(jq -r '.title' <<<"${pr}")"
          draft="$(jq -r '.draft' <<<"${pr}")"
          state="$(jq -r '.state' <<<"${pr}")"

          if [[ "${state}" != "open" || "${draft}" != "false" ]]; then
            echo "PR #${pr_number} is not an open, ready pull request."
            exit 0
          fi

          if [[ "${base_ref}" != "main" || "${head_repo}" != "${REPOSITORY}" ]]; then
            echo "PR #${pr_number} does not target main from the same repository."
            exit 0
          fi

          if [[ "${head_ref}" != release-please--branches--main--components--* ]]; then
            echo "PR #${pr_number} is not a Release Please branch."
            exit 0
          fi

          if [[ ! "${title}" =~ ^chore\(main\):\ release\ [0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "PR #${pr_number} does not have a Release Please release title."
            exit 0
          fi

          jenkins_state="$({
            gh api "repos/${REPOSITORY}/commits/${head_sha}/statuses"
          } | jq -r \
              '[.[] | select(.context == "continuous-integration/jenkins/pr-head")] | first | .state // "missing"')"

          if [[ "${jenkins_state}" != "success" ]]; then
            echo "Jenkins status for PR #${pr_number}: ${jenkins_state}; auto-merge remains disabled."
            exit 0
          fi

          auto_merge_enabled="$(
            gh pr view "${pr_number}" \
              --repo "${REPOSITORY}" \
              --json autoMergeRequest \
              --jq '.autoMergeRequest != null'
          )"

          if [[ "${auto_merge_enabled}" == "true" ]]; then
            echo "Auto-merge is already enabled for PR #${pr_number}."
            exit 0
          fi

          gh pr merge "${pr_number}" \
            --repo "${REPOSITORY}" \
            --auto \
            --squash
