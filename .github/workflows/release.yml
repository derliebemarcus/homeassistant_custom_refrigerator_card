name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Optional semantic version tag, for example v0.2.0
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Resolve release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          VERSION="${REQUESTED_VERSION:-v$PACKAGE_VERSION}"
          test "$VERSION" = "v$PACKAGE_VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "create=false" >> "$GITHUB_OUTPUT"
            echo "Release $VERSION already exists"
          else
            echo "create=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Test and build
        run: |
          npm test
          npm run build
          git diff --exit-code -- dist/

      - name: Create GitHub release
        if: steps.version.outputs.create == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$VERSION" \
            dist/homeassistant_custom_refrigerator_card.js \
            --target "$GITHUB_SHA" \
            --title "$VERSION" \
            --generate-notes
