name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Require release token
        env:
          RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        shell: bash
        run: |
          test -n "$RELEASE_PLEASE_TOKEN" || {
            echo "RELEASE_PLEASE_TOKEN is not configured."
            exit 1
          }

      - name: Create or update release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Check out released revision
        if: steps.release.outputs.release_created == 'true'
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Set up Node.js
        if: steps.release.outputs.release_created == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Test and build release asset
        if: steps.release.outputs.release_created == 'true'
        run: |
          npm ci --ignore-scripts
          npm test
          npm run build
          git diff --exit-code -- dist/

      - name: Upload card asset
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          gh release upload "$TAG_NAME" \
            dist/homeassistant_custom_refrigerator_card.js \
            --clobber
